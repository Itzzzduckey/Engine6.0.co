const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

let w=0
let h=0
let particles=[]
const particleCount=46

function resize(){
  w=canvas.width=window.innerWidth
  h=canvas.height=window.innerHeight
  particles=Array.from({length:particleCount},createParticle)
}

function createParticle(){
  return{
    x:Math.random()*w,
    y:h*(0.58+Math.random()*0.34),
    r:Math.random()*1.7+0.35,
    a:Math.random()*0.22+0.05,
    vx:(Math.random()-0.5)*0.12,
    vy:-(Math.random()*0.16+0.02)
  }
}

function drawParticle(p){
  ctx.beginPath()
  ctx.fillStyle=`rgba(118,244,255,${p.a})`
  ctx.shadowBlur=10
  ctx.shadowColor="rgba(65,230,255,0.34)"
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
  ctx.fill()
  ctx.shadowBlur=0
}

function animate(){
  ctx.clearRect(0,0,w,h)
  const floorGlow=ctx.createRadialGradient(w*0.5,h*0.95,0,w*0.5,h*0.95,h*0.44)
  floorGlow.addColorStop(0,"rgba(0,238,255,0.12)")
  floorGlow.addColorStop(0.24,"rgba(0,238,255,0.06)")
  floorGlow.addColorStop(1,"rgba(0,0,0,0)")
  ctx.fillStyle=floorGlow
  ctx.fillRect(0,0,w,h)

  for(const p of particles){
    p.x+=p.vx
    p.y+=p.vy
    if(p.y<h*0.34||p.x<-20||p.x>w+20){
      Object.assign(p,createParticle(),{
        x:Math.random()*w,
        y:h*(0.78+Math.random()*0.12)
      })
    }
    drawParticle(p)
  }
  requestAnimationFrame(animate)
}

      <div class="guide-badge">${guide.badge}</div>
      <div class="guide-card-title">${guide.cardTitle}</div>
      <div class="guide-card-desc">${guide.cardDesc}</div>
      <div class="guide-link">Open Guide →</div>
    `
    card.addEventListener("click", () => openGuide(guide.id))
    grid.appendChild(card)
  })
}

function buildGuide(guideId){
  const guide = guideData.guides.find(g => g.id === guideId)
  if(!guide) return

  document.getElementById("guide-status").textContent = guide.status
  document.getElementById("guide-title").innerHTML = guide.pageTitle
  document.getElementById("guide-subtitle").textContent = guide.pageSubtitle

  const stepsWrap = document.getElementById("guide-steps")
  const downloadsWrap = document.getElementById("guide-downloads")

  stepsWrap.innerHTML = ""
  downloadsWrap.innerHTML = ""

  guide.steps.forEach((step, index) => {
    const stepCard = document.createElement("div")
    stepCard.className = `step-card ${index === 0 ? "open" : ""}`

    stepCard.innerHTML = `
      <button class="step-trigger" type="button">
        <div class="step-left">
          <div class="step-num">${String(index + 1).padStart(2, "0")}</div>
          <div>
            <div class="step-title">${step.title}</div>
            <div class="step-sub">${step.sub}</div>
          </div>
        </div>
        <div class="step-arrow">⌄</div>
      </button>
      <div class="step-panel">
        <div class="step-panel-inner">
          <div class="step-panel-content">${step.content}</div>
        </div>
      </div>
    `

    const trigger = stepCard.querySelector(".step-trigger")
    trigger.addEventListener("click", () => {
      stepCard.classList.toggle("open")
    })

    stepsWrap.appendChild(stepCard)
  })

  guide.downloads.forEach(download => {
    const a = document.createElement("a")
    a.className = "download-btn"
    a.href = download.href
    a.target = "_blank"
    a.rel = "noopener noreferrer"
    a.textContent = download.text
    downloadsWrap.appendChild(a)
  })

  document.getElementById("guides-hub").style.display = "none"
  document.getElementById("dynamic-guide-page").classList.add("active")
  window.scrollTo({top:0,behavior:"smooth"})
}

function openGuide(id){
  buildGuide(id)
}

function showHub(){
  document.getElementById("dynamic-guide-page").classList.remove("active")
  document.getElementById("guides-hub").style.display = "block"
  window.scrollTo({top:0,behavior:"smooth"})
}

window.addEventListener("resize",resize)

buildHub()
resize()
animate()
</script>

</body>
</html>
